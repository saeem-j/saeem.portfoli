<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>
    .box1{
        width: 350px;
        height: auto;
        padding: 10px;
        margin: auto;
        border-radius: 10px;
        border: 4px solid black;
        text-align: center;
        background-color: aqua;
    }

    .boxA{
        font-size: xx-large;
        font-family: 'Franklin Gothic Medium', Arial;
        font-weight: bold;
        margin-bottom: 20px;
    }

    input{
        width: 90%;
        padding: 10px;
        margin: 5px;
        font-size: 16px;
    }

    button{
        padding: 10px 15px;
        margin: 5px;
        font-size: 16px;
        cursor: pointer;
    }

    #result{
        margin-top: 15px;
        font-size: 20px;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="box1">
    <div class="boxA">Calculator</div>

    <input type="text" placeholder="Enter First Number" onclick="setFocus('num1')" id="num1">
    <input type="text" placeholder="Enter Second Number" onclick="setFocus('num2')" id="num2">

    <div>
        <button onclick="Calculator('+')">Sum</button>
        <button onclick="Calculator('-')">Sub</button>
        <button onclick="Calculator('*')">Mul</button>
        <button onclick="Calculator('/')">Div</button>
    </div>

    <!-- Number Buttons -->
    <div>
        <button onclick="appendNumber('1')">1</button>
        <button onclick="appendNumber('2')">2</button>
        <button onclick="appendNumber('3')">3</button>
    </div>
    <div>
        <button onclick="appendNumber('4')">4</button>
        <button onclick="appendNumber('5')">5</button>
        <button onclick="appendNumber('6')">6</button>
    </div>
    <div>
        <button onclick="appendNumber('7')">7</button>
        <button onclick="appendNumber('8')">8</button>
        <button onclick="appendNumber('9')">9</button>
    </div>
    <div>
        <button onclick="appendNumber('0')">0</button>
        <button onclick="appendNumber('.')">.</button>
        <button onclick="clearInput()">C</button>
    </div>

    <div id="result">Result: </div>
</div>

<script>
    let activeInput = 'num1';

    function setFocus(inputId){
        activeInput = inputId;
    }

    function appendNumber(number){
        document.getElementById(activeInput).value += number;
    }

    function clearInput(){
        document.getElementById('num1').value = '';
        document.getElementById('num2').value = '';
        document.getElementById('result').innerText = 'Result: ';
    }

    function Calculator(operator){
        let num1 = parseFloat(document.getElementById('num1').value);
        let num2 = parseFloat(document.getElementById('num2').value);
        let result;

        if (isNaN(num1) || isNaN(num2)){
            result = "Enter valid numbers";
        } else {
            switch(operator){
                case '+': result = num1 + num2; break;
                case '-': result = num1 - num2; break;
                case '*': result = num1 * num2; break;
                case '/':
                    result = (num2 !== 0) ? (num1 / num2) : "Cannot divide by zero";
                    break;
            }
        }

        document.getElementById('result').innerText = "Result: " + result;
    }
</script>

</body>
</html>
